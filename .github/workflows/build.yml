name: Ultimate Success Build
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Flet
        run: |
          python -m pip install --upgrade pip
          pip install flet telethon==1.24.0 pyaes

      - name: Build APK (The "Yes" Mode)
        run: |
          # السطر السحري: بنقول للسيرفر وافق على كل حاجة أوتوماتيك
          yes | flet build apk --verbose

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: saud-app-v1
          path: build/apk/*.apk
