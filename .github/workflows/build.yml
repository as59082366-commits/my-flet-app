name: Build Flet APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # بنسطب النسخ اللي مش بتضرب مع بعضها في الأندرويد
          pip install flet telethon==1.24.0

      - name: Build APK
        run: |
          # هنا بنبني التطبيق وبنتخطى أي مشكلة في الـ requirements
          flet build apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/apk/*.apk
