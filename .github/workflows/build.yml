name: Super Final Build
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Critical Tools
        run: |
          python -m pip install --upgrade pip
          # تسطيب flet النسخة المستقرة و telethon
          pip install flet telethon==1.24.0 pyaes

      - name: Build APK (The Silent Way)
        run: |
          # الموافقة على الرخص بطريقة صامتة ومضمونة
          mkdir -p $ANDROID_HOME/licenses
          echo "24333f8a63b6825ea9c5573f43592f4d23b1622e" > $ANDROID_HOME/licenses/android-sdk-license
          echo "8933bad161af4178b1185d1a37fbf41ea5269c55" >> $ANDROID_HOME/licenses/android-sdk-license
          
          # بناء التطبيق مع تجاهل تحذيرات الـ Doctor
          flet build apk --verbose

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-final-version
          path: build/apk/*.apk
