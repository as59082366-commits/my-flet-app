name: Guaranteed APK Build
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Prepare Environment
        run: |
          python -m pip install --upgrade pip
          # تسطيب المكتبات بنسخ "متوافقة" يدوياً بعيداً عن الملفات القديمة
          pip install flet telethon==1.24.0 pyaes pyasn1 rsa

      - name: Build APK (Force Mode)
        run: |
          # تخطي الرخص بطريقة "إجبارية" للسيرفر
          mkdir -p $ANDROID_HOME/licenses
          echo -e "\n24333f8a63b6825ea9c5573f43592f4d23b1622e" > $ANDROID_HOME/licenses/android-sdk-license
          
          # أمر البناء الصافي
          flet build apk --verbose

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: Saud-Telegram-App
          path: build/apk/*.apk
