name: Final Build APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Tools
        run: |
          python -m pip install --upgrade pip
          pip install flet telethon==1.24.0

      - name: Clean and Build APK
        run: |
          # تنظيف أي مخلفات قديمة
          rm -rf build
          # أمر البناء مع إظهار كل التفاصيل عشان لو وقف نعرف ليه
          flet build apk --verbose

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-final-app
          path: build/apk/*.apk
